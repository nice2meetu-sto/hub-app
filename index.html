<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#534AB7" />
<title>보드게임 Hub</title>
<!-- PWA (앱처럼 설치/실행) -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="보드게임 Hub" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div class="appbar">
    <h1 onclick="openHubMenu()" style="cursor:pointer;" title="허브 전환"><span class="dice">🎲</span> <span id="hub-title">보드게임 Hub</span> <span id="build-tag" style="font-size:10px;font-weight:500;color:var(--text-sub);vertical-align:middle;">v1615</span></h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <button id="admin-btn" onclick="openAdminPage()" title="관리자 페이지"
              style="display:none;background:#fff3e0;color:#c77700;border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">🛠</button>
      <button onclick="refreshAll()" title="최신 데이터로 업데이트"
              style="background:var(--main-light);color:var(--main);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">🔄</button>
      <div class="who" id="whoami" onclick="switchView('my')" style="cursor:pointer;">비로그인</div>
    </div>
  </div>

  <!-- ===== VIEW: 플레이 ===== -->
  <div class="view" id="view-play">
    <div class="summary-row" id="play-summary"></div>
    <div id="play-catchart"></div>
    <div class="section-title" id="play-list-title">게임별 플레이 횟수</div>
    <div id="play-list"></div>
  </div>

  <!-- ===== VIEW: 게임 ===== -->
  <div class="view active" id="view-games">
    <div class="searchrow">
      <div class="searchbox">
        <span>🔍</span>
        <input id="game-search" placeholder="게임 이름 검색 (한글/영문)" />
      </div>
      <button class="sortbtn" id="game-sort-btn" title="평점 정렬" onclick="cycleGameSort()">평점</button>
    </div>
    <div class="chip-row" id="cat-filter"></div>
    <div class="chip-row" id="player-filter"></div>
    <div class="chip-row" id="weight-filter"></div>
    <div id="games-list"></div>
  </div>

  <!-- ===== VIEW: MY ===== -->
  <div class="view" id="view-my">
    <div id="my-login" style="display:none;"></div>
    <div id="my-content" style="display:none;">
      <div class="subtabs">
        <button id="mytab-overview" class="on" onclick="switchMyTab('overview')">전체 기록</button>
        <button id="mytab-plays" onclick="switchMyTab('plays')">플레이 기록</button>
        <button id="mytab-games" onclick="switchMyTab('games')">게임 기록</button>
      </div>
      <div id="my-overview"></div>
      <div id="my-plays" style="display:none;"></div>
      <div id="my-games" style="display:none;"></div>
      <div id="my-linkrow" style="text-align:center;margin:18px 0 0;"></div>
      <div style="text-align:center;margin:14px 0 4px;">
        <button class="logout-link" onclick="logout()">로그아웃</button>
      </div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openAddSheet()">+</button>

  <!-- Tabbar -->
  <div class="tabbar">
    <button class="tab" id="tab-play" onclick="switchView('play')"><span class="ico">📋</span>플레이</button>
    <button class="tab on" id="tab-games" onclick="switchView('games')"><span class="ico">🎯</span>게임</button>
    <button class="tab" id="tab-my" onclick="switchView('my')"><span class="ico">👤</span>MY</button>
  </div>
</div>

<!-- ===== Add Sheet (게임추가 / 플레이추가) ===== -->
<div class="overlay" id="add-overlay">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-tabs">
      <button id="addtab-play" class="on" onclick="switchAddTab('play')">📋 플레이 결과</button>
      <button id="addtab-game" onclick="switchAddTab('game')">🎯 게임 추가</button>
    </div>
    <div id="add-game-form"></div>
    <div id="add-play-form" style="display:none;"></div>
  </div>
</div>

<!-- ===== Generic detail sheet (게임 상세) ===== -->
<div class="overlay" id="detail-overlay">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- ===== 게임 상세 페이지 (전체 화면) ===== -->
<div id="gd-page">
  <div class="gd-header">
    <button class="gd-back" onclick="closeGameDetail()">‹ 돌아가기</button>
    <button class="gd-memo-btn" onclick="openMemoEditor()">📝 게임메모</button>
  </div>
  <div id="gd-body"></div>
  <!-- 개인 게임메모 편집 오버레이 -->
  <div id="gd-memo-overlay">
    <div class="gd-memo-card">
      <h3>📝 게임메모</h3>
      <div class="muted">나만 보는 개인 메모예요. (공개되지 않아요)</div>
      <textarea class="input" id="gd-memo-text" placeholder="전략 노트, 하우스룰 등 자유롭게"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn ghost sm" style="flex:1;" onclick="closeMemoEditor()">취소</button>
        <button class="btn sm" style="flex:1;" onclick="saveMemo()">저장</button>
      </div>
    </div>
  </div>
  <!-- 막대 클릭 → 그날 참가자 점수 오버레이 -->
  <div id="gd-session-overlay">
    <div class="gd-memo-card" id="gd-session-card"></div>
  </div>
</div>

<!-- ===== 관리자 페이지 (전체 화면, admin 전용) ===== -->
<div id="admin-page">
  <div class="gd-header">
    <button class="gd-back" onclick="closeAdminPage()">‹ 돌아가기</button>
    <span style="font-weight:900;font-size:15px;">🛠 관리자</span>
  </div>
  <div class="subtabs" style="margin-bottom:14px;">
    <button id="admtab-games" class="on" onclick="switchAdminTab('games')">게임</button>
    <button id="admtab-plays" onclick="switchAdminTab('plays')">플레이</button>
    <button id="admtab-players" onclick="switchAdminTab('players')">가입자</button>
  </div>
  <div id="adm-games"></div>
  <div id="adm-plays" style="display:none;"></div>
  <div id="adm-players" style="display:none;"></div>
</div>

<!-- ===== 시작/허브전환 화면 ===== -->
<div id="start-page">
  <button id="start-close" onclick="closeStartPage()">✕</button>
  <div class="start-wrap">
    <div class="start-logo">🎲</div>
    <h2 style="margin:6px 0 2px;">보드게임 Hub</h2>
    <div class="hint" style="margin-bottom:26px;">동호회 보드게임 기록 관리</div>
    <div class="field" style="text-align:left;">
      <label>초대코드로 허브 들어가기</label>
      <div style="display:flex;gap:8px;">
        <input class="input" id="start-invite" placeholder="예: AB12CD" maxlength="12"
               style="text-transform:uppercase;flex:1;" onkeydown="if(event.key==='Enter')joinByInvite()" />
        <button class="btn sm" style="flex:0 0 auto;" onclick="joinByInvite()">입장</button>
      </div>
    </div>
    <div class="start-div"><span>또는 이메일로</span></div>
    <button class="btn ghost" style="margin-bottom:10px;" onclick="openEmailAuth('create')">🏠 새 허브 만들기</button>
    <button class="btn ghost" onclick="openEmailAuth('personal')">📔 개인 기록장 시작</button>
  </div>
</div>

<!-- ===== 내 허브 드롭다운 시트 ===== -->
<div class="overlay" id="hubmenu-overlay" onclick="if(event.target===this)closeHubMenu()">
  <div class="sheet" style="height:auto;">
    <div class="sheet-grip"></div>
    <div id="hubmenu-body"></div>
  </div>
</div>

<!-- ===== 이메일 계정 시트 ===== -->
<div class="overlay" id="email-overlay">
  <div class="sheet" style="height:auto;min-height:40vh;">
    <div class="sheet-grip"></div>
    <div id="email-body"></div>
    <button class="btn ghost sm" style="width:100%;margin-top:12px;" onclick="closeEmailAuth()">닫기</button>
  </div>
</div>

<div id="toast"></div>
<div id="loader"><div class="spinner"></div><div class="ltxt">불러오는 중…</div></div>

<!-- Supabase JS 클라이언트 (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
