<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#534AB7" />
<title>보드게임 Hub</title>
<!-- PWA (앱처럼 설치/실행) -->
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="보드게임 Hub" />
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=2140">
</head>
<body>
<div id="app">
  <div class="appbar">
    <h1 onclick="openHubMenu()" style="cursor:pointer;" title="허브 전환"><span class="dice" id="hub-icon">🎲</span> <span id="hub-title">보드게임 Hub</span> <span id="build-tag" style="font-size:10px;font-weight:500;color:var(--text-sub);vertical-align:middle;">v2140</span></h1>
    <div style="display:flex;align-items:center;gap:10px;">
      <button onclick="openDogam()" title="게임 도감"
              style="background:var(--main-light);color:var(--main);border-radius:999px;padding:5px 10px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">📚</button>
      <button onclick="refreshAll()" title="최신 데이터로 업데이트"
              style="background:var(--main-light);color:var(--main);border-radius:999px;padding:5px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;">🔄</button>
      <div class="who" id="whoami" onclick="whoamiTap(event)" style="cursor:pointer;">비로그인</div>
    </div>
  </div>

  <!-- ===== VIEW: 플레이 ===== -->
  <div class="view" id="view-play">
    <div class="summary-row" id="play-summary"></div>
    <div id="play-catchart"></div>
    <div class="section-title" id="play-list-title">게임별 플레이 횟수</div>
    <div id="play-list"></div>
  </div>

  <!-- ===== VIEW: 게임 ===== -->
  <div class="view active" id="view-games">
    <div class="searchrow">
      <div class="searchbox">
        <span>🔍</span>
        <input id="game-search" placeholder="게임 이름 검색 (한글/영문)" />
      </div>
      <button class="sortbtn" id="game-sort-btn" title="평점 정렬" onclick="cycleGameSort()">평점</button>
    </div>
    <div class="chip-row" id="cat-filter"></div>
    <div class="chip-row" id="player-filter"></div>
    <div class="chip-row" id="weight-filter"></div>
    <div id="games-list"></div>
  </div>

  <!-- ===== VIEW: MY ===== -->
  <div class="view" id="view-my">
    <div id="my-login" style="display:none;"></div>
    <div id="my-content" style="display:none;">
      <div class="subtabs">
        <button id="mytab-overview" class="on" onclick="switchMyTab('overview')">전체 기록</button>
        <button id="mytab-plays" onclick="switchMyTab('plays')">플레이 기록</button>
        <button id="mytab-games" onclick="switchMyTab('games')">게임 기록</button>
      </div>
      <div id="my-overview"></div>
      <div id="my-plays" style="display:none;"></div>
      <div id="my-games" style="display:none;"></div>
    </div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openAddSheet()">+</button>

  <!-- Tabbar -->
  <div class="tabbar">
    <button class="tab" id="tab-play" onclick="switchView('play')"><span class="ico">📋</span>플레이</button>
    <button class="tab on" id="tab-games" onclick="switchView('games')"><span class="ico">🎯</span>게임</button>
    <button class="tab" id="tab-my" onclick="switchView('my')"><span class="ico">👤</span>MY</button>
  </div>
</div>

<!-- ===== Add Sheet (게임추가 / 플레이추가) ===== -->
<div class="overlay" id="add-overlay">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div class="sheet-tabs">
      <button id="addtab-play" class="on" onclick="switchAddTab('play')">📋 플레이 결과</button>
      <button id="addtab-game" onclick="switchAddTab('game')">🎯 게임 추가</button>
    </div>
    <div id="add-game-form"></div>
    <div id="add-play-form" style="display:none;"></div>
  </div>
</div>

<!-- ===== 닉네임 미니 메뉴 (MY 탭에서 상단 닉네임 탭) ===== -->
<div id="nick-menu">
  <button id="nickmenu-admin" style="display:none;color:#c77700;" onclick="nickMenuPick('admin')">🛠 관리자</button>
  <button onclick="nickMenuPick('settings')">👤 개인설정</button>
  <button onclick="nickMenuPick('feedback')">💬 의견보내기</button>
  <button onclick="nickMenuPick('main')">🏠 메인으로</button>
  <button onclick="nickMenuPick('logout')">🚪 로그아웃</button>
</div>

<!-- ===== 중앙 미니 팝업 (개인설정 / 의견보내기) ===== -->
<div id="mini-overlay" onclick="if(event.target===this)closeMiniPopup()">
  <div class="gd-memo-card" id="mini-card"></div>
</div>

<!-- ===== Generic detail sheet (게임 상세) ===== -->
<div class="overlay" id="detail-overlay">
  <div class="sheet">
    <div class="sheet-grip"></div>
    <div id="detail-body"></div>
  </div>
</div>

<!-- ===== 게임 상세 페이지 (전체 화면) ===== -->
<div id="gd-page">
  <div class="gd-header">
    <button class="gd-back" onclick="closeGameDetail()">‹ 돌아가기</button>
    <button class="gd-memo-btn" onclick="openMemoEditor()">📝 게임메모</button>
  </div>
  <div id="gd-body"></div>
  <!-- 개인 게임메모 편집 오버레이 -->
  <div id="gd-memo-overlay">
    <div class="gd-memo-card">
      <h3>📝 게임메모</h3>
      <div class="muted">나만 보는 개인 메모예요. (공개되지 않아요)</div>
      <textarea class="input" id="gd-memo-text" placeholder="전략 노트, 하우스룰 등 자유롭게"></textarea>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn ghost sm" style="flex:1;" onclick="closeMemoEditor()">취소</button>
        <button class="btn sm" style="flex:1;" onclick="saveMemo()">저장</button>
      </div>
    </div>
  </div>
  <!-- 막대 클릭 → 그날 참가자 점수 오버레이 -->
  <div id="gd-session-overlay">
    <div class="gd-memo-card" id="gd-session-card"></div>
  </div>
</div>

<!-- ===== 게임 도감 (전체 화면) ===== -->
<div id="dogam-page">
  <div class="gd-header"><button class="gd-back" onclick="closeDogam()">‹ 돌아가기</button></div>
  <div class="dg-titlerow">
    <button id="dogam-menu-btn" onclick="toggleDogamCat(event)" title="카테고리">☰</button>
    <h2 id="dogam-title">게임 도감</h2>
    <span id="dogam-sub" class="hint" style="margin:0;">전체</span>
    <div class="dg-filters">
      <button class="chip" id="dogam-pc-btn" onclick="toggleDogamPlayers(event)">인원 전체</button>
      <button class="chip" id="dogam-wt-btn" onclick="toggleDogamWeight(event)">난이도 전체</button>
    </div>
  </div>
  <div class="searchrow">
    <div class="searchbox"><span>🔍</span>
      <input id="dogam-search" placeholder="게임 검색 (한글/영문)" oninput="dogamSearchInput()" />
    </div>
  </div>
  <div id="dogam-grid"></div>
  <div id="dogam-sentinel" style="height:1px;"></div>
</div>

<!-- 게임 도감 카테고리 드롭다운 -->
<div id="dogam-catmenu"></div>

<!-- ===== 관리자 페이지 (전체 화면, admin 전용) ===== -->
<div id="admin-page">
  <div class="gd-header">
    <button class="gd-back" onclick="closeAdminPage()">‹ 돌아가기</button>
    <span style="display:flex;align-items:center;gap:8px;">
      <button id="adm-cat-btn" onclick="openAdminCats()"
        style="background:#fff6d8;border:1px solid #f1e3ad;color:#8a6d1a;border-radius:10px;padding:6px 10px;font-size:12px;font-weight:800;">🗂 카테고리</button>
      <span style="font-weight:900;font-size:15px;">🛠 관리자</span>
    </span>
  </div>
  <div class="subtabs" style="margin-bottom:14px;">
    <button id="admtab-games" class="on" onclick="switchAdminTab('games')">게임</button>
    <button id="admtab-plays" onclick="switchAdminTab('plays')">플레이</button>
    <button id="admtab-players" onclick="switchAdminTab('players')">가입자</button>
  </div>
  <div id="adm-games"></div>
  <div id="adm-plays" style="display:none;"></div>
  <div id="adm-players" style="display:none;"></div>
</div>

<!-- ===== 시작 화면 (첫 진입 페이지) ===== -->
<div id="start-page">
  <button id="start-close" onclick="closeStartPage()">✕</button>
  <div class="start-wrap">
    <div class="start-logo" id="start-logo">🎲</div>
    <h2 id="start-title" style="margin:6px 0 2px;">보드게임 Hub</h2>
    <div id="start-sub" class="hint" style="margin-bottom:26px;">모임 중심 보드게임 기록 관리</div>

    <!-- 홈: 초대코드 입력(상시) + 이메일 시작 -->
    <div class="start-view" id="sv-home">
      <div class="field" style="text-align:left;">
        <label style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;">허브 초대코드
          <span id="last-hub-tag" class="hint" style="margin:0;font-weight:500;"></span></label>
        <input class="input" id="start-invite" placeholder="예: AB12CD"
               oninput="inviteAutoExtract(this)" onkeydown="if(event.key==='Enter')startInviteNext()" />
      </div>
      <button class="btn" style="margin-bottom:10px;" onclick="startInviteNext()">🔑 초대코드로 시작
        <div class="hint" style="margin:3px 0 0;font-weight:500;color:#e9e7f8;">받은 초대 문구를 붙여 넣고 간편하게 시작하세요</div>
      </button>
      <button class="btn ghost" onclick="startEmailEntry()">📧 이메일로 시작
        <div class="hint" style="margin:3px 0 0;font-weight:500;">신규 허브 개설·여러 허브 통합 사용이 가능해요</div>
      </button>
    </div>

    <!-- 초대코드 입장: 허브 확인 후 로그인/가입 -->
    <div class="start-view" id="sv-invite" style="display:none;">
      <h2 id="ji-hub" style="margin:6px 0 2px;"></h2>
      <div class="hint" style="margin:0 0 20px;">이 허브로 들어가요 · 아니면 ‹ 뒤로</div>
      <div class="subtabs" style="margin-bottom:14px;">
        <button id="ji-tab-login" class="on" onclick="jiSetMode('login')">로그인</button>
        <button id="ji-tab-signup" onclick="jiSetMode('signup')">처음이에요</button>
      </div>
      <div class="field" style="text-align:left;"><label>닉네임</label>
        <input class="input" id="ji-name" placeholder="허브 닉네임 (수정 가능해요)" maxlength="20" autocomplete="off" /></div>
      <div class="field" style="text-align:left;"><label>비밀번호 (숫자 4자리)</label>
        <input class="input" id="ji-pin" type="password" inputmode="numeric" pattern="[0-9]*"
               maxlength="4" placeholder="••••" autocomplete="off"
               onkeydown="if(event.key==='Enter')joinByInvite()" /></div>
      <button class="btn" id="ji-go" onclick="joinByInvite()">가입하고 입장</button>
      <button class="logout-link" style="margin-top:16px;color:var(--text-sub);" onclick="startShow('home')">‹ 뒤로</button>
    </div>

    <!-- 이메일 로그인/가입 -->
    <div class="start-view" id="sv-email" style="display:none;">
      <div class="subtabs" style="margin-bottom:16px;">
        <button id="se-tab-login" class="on" onclick="seSetMode('login')">로그인</button>
        <button id="se-tab-signup" onclick="seSetMode('signup')">가입하기</button>
      </div>
      <div class="field" style="text-align:left;"><label>이메일</label>
        <input class="input" id="se-email" type="email" placeholder="you@example.com" autocomplete="email" /></div>
      <div class="field" style="text-align:left;"><label>비밀번호 (6자 이상)</label>
        <input class="input" id="se-pw" type="password" placeholder="••••••" /></div>
      <button class="btn" id="se-go" onclick="doStartEmail()">로그인</button>
      <div style="margin-top:12px;">
        <button class="logout-link" style="color:var(--main);" onclick="forgotPw()">비밀번호를 잊었어요</button>
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin:18px 0 14px;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span class="hint" style="margin:0;">또는</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>
      <!-- 구글 공식 버튼(Google Identity Services)이 여기 렌더됨 -->
      <div id="g-signin-slot" style="display:flex;justify-content:center;min-height:44px;"></div>
      <!-- GIS 스크립트가 차단/미로딩된 환경 폴백(리다이렉트 방식) -->
      <button class="btn ghost" id="se-google-fallback" onclick="startGoogleRedirect()"
              style="display:none;align-items:center;justify-content:center;gap:10px;background:#fff;border:1px solid #dadce0;color:#3c4043;">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true" style="flex:0 0 auto;">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Google로 계속하기
      </button>
      <button class="logout-link" style="margin-top:16px;color:var(--text-sub);" onclick="startShow('home')">‹ 뒤로</button>
    </div>

    <!-- 로그인 후: 내 허브 목록 -->
    <div class="start-view" id="sv-hubs" style="display:none;"></div>

    <!-- 허브 개설 -->
    <div class="start-view" id="sv-create" style="display:none;">
      <div style="display:flex;gap:8px;text-align:left;">
        <div class="field" style="flex:0 0 auto;"><label>허브 아이콘</label>
          <input class="input" id="sc-icon" value="🎲" maxlength="2"
                 style="width:43px;height:43px;padding:0;text-align:center;font-size:20px;" /></div>
        <div class="field" style="flex:1;min-width:0;"><label>허브 이름</label>
          <input class="input" id="sc-name" placeholder="예: 허브" maxlength="30" /></div>
      </div>
      <div class="field" style="text-align:left;"><label>허브용 닉네임</label>
        <input class="input" id="sc-nick" placeholder="비우면 기록장 닉네임 사용" maxlength="20" /></div>
      <div class="field" style="text-align:left;"><label>백업PIN (숫자 4자리)</label>
        <input class="input" id="sc-pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="4" placeholder="••••" />
        <div class="hint" style="margin-top:4px;">이메일 오류시 닉네임+백업PIN으로 로그인하는 비상 열쇠예요</div></div>
      <button class="btn" onclick="startCreateHub()">허브 만들기</button>
      <button class="logout-link" style="margin-top:16px;color:var(--text-sub);" onclick="loadStartHubs()">‹ 뒤로</button>
    </div>

    <!-- 허브 개설 완료 (초대코드 안내/복사) -->
    <div class="start-view" id="sv-created" style="display:none;"></div>

    <!-- 계정 연결 확인 (연결된 허브·닉네임 + 연결해제) -->
    <div class="start-view" id="sv-links" style="display:none;"></div>

    <!-- 비밀번호 재설정 -->
    <div class="start-view" id="sv-recovery" style="display:none;">
      <h3 style="margin:0 0 12px;">🔐 새 비밀번호 설정</h3>
      <div class="field" style="text-align:left;"><label>새 비밀번호 (6자 이상)</label>
        <input class="input" id="sr-pw" type="password" placeholder="••••••" /></div>
      <button class="btn" onclick="doRecovery()">비밀번호 변경</button>
    </div>
  </div>
</div>

<!-- ===== 내 허브 드롭다운 시트 ===== -->
<div id="hubmenu-overlay" onclick="if(event.target===this)closeHubMenu()">
  <div class="gd-memo-card" id="hubmenu-card" style="max-height:75vh;overflow-y:auto;">
    <div id="hubmenu-body"></div>
  </div>
</div>

<!-- ===== 이메일 계정 시트 ===== -->
<div class="overlay" id="email-overlay">
  <div class="sheet" style="height:auto;min-height:40vh;">
    <div class="sheet-grip"></div>
    <div id="email-body"></div>
    <button class="btn ghost sm" style="width:100%;margin-top:12px;" onclick="closeEmailAuth()">닫기</button>
  </div>
</div>

<div id="toast"></div>
<div id="loader"><div class="spinner"></div><div class="ltxt">불러오는 중…</div></div>

<!-- Supabase JS 클라이언트 (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Google Identity Services (구글 로그인 팝업 — 내 도메인에서 실행) -->
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="app.js?v=2140"></script>
</body>
</html>
